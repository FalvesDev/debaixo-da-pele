<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="8" fill="#1a1a2e"/>
  <!-- Máscara base (mais industrial) -->
  <ellipse cx="50" cy="52" rx="32" ry="35" fill="#2a3a2a"/>
  <ellipse cx="50" cy="52" rx="30" ry="33" fill="#223322"/>
  <!-- Viseira panorâmica -->
  <ellipse cx="50" cy="40" rx="24" ry="15" fill="#1a5a3a"/>
  <ellipse cx="50" cy="40" rx="22" ry="13" fill="#0a3a22"/>
  <ellipse cx="50" cy="40" rx="20" ry="11" fill="#052a15" opacity="0.9"/>
  <!-- Reflexo especial (viseira de lab) -->
  <ellipse cx="42" cy="35" rx="7" ry="4" fill="#00ff88" opacity="0.1"/>
  <line x1="38" y1="34" x2="54" y2="36" stroke="#00ff88" opacity="0.07" stroke-width="3"/>
  <!-- Filtro HEPA triplo (central) -->
  <ellipse cx="50" cy="63" rx="12" ry="9" fill="#445544"/>
  <ellipse cx="50" cy="63" rx="10" ry="7" fill="#334433"/>
  <!-- 3 camadas de filtro visíveis -->
  <rect x="42" y="58" width="16" height="2" rx="1" fill="#556655" opacity="0.8"/>
  <rect x="42" y="62" width="16" height="2" rx="1" fill="#556655" opacity="0.8"/>
  <rect x="42" y="66" width="16" height="2" rx="1" fill="#556655" opacity="0.8"/>
  <!-- Filtros laterais maiores -->
  <ellipse cx="28" cy="60" rx="8" ry="6" fill="#445544"/>
  <ellipse cx="28" cy="60" rx="6" ry="4" fill="#334433"/>
  <ellipse cx="72" cy="60" rx="8" ry="6" fill="#445544"/>
  <ellipse cx="72" cy="60" rx="6" ry="4" fill="#334433"/>
  <!-- Tarja verde "especial" -->
  <rect x="18" y="76" width="64" height="9" rx="3" fill="#1a4a1a"/>
  <text x="50" y="83" text-anchor="middle" font-family="sans-serif" font-size="6.5" font-weight="bold" fill="#00ff88">FILTRO LAB ✓</text>
  <!-- Presilhas reforçadas -->
  <rect x="8" y="38" width="5" height="20" rx="2" fill="#333"/>
  <rect x="87" y="38" width="5" height="20" rx="2" fill="#333"/>
</svg>

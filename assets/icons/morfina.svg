<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="8" fill="#1a1a2e"/>
  <!-- Corpo da seringa -->
  <rect x="20" y="44" width="55" height="12" rx="4" fill="#e0e8f0"/>
  <!-- Êmbolo -->
  <rect x="18" y="46" width="8" height="8" rx="2" fill="#aabbc0"/>
  <rect x="14" y="43" width="6" height="14" rx="1" fill="#9aaab0"/>
  <!-- Agulha -->
  <path d="M75 48 L92 50 L75 52 Z" fill="#c0c8d0"/>
  <!-- Líquido dentro (morfina - amarelado) -->
  <rect x="26" y="46" width="38" height="8" rx="2" fill="#e8e060" opacity="0.7"/>
  <!-- Marcações de dosagem -->
  <line x1="36" y1="44" x2="36" y2="47" stroke="#888" stroke-width="1.5"/>
  <line x1="46" y1="44" x2="46" y2="47" stroke="#888" stroke-width="1.5"/>
  <line x1="56" y1="44" x2="56" y2="47" stroke="#888" stroke-width="1.5"/>
  <line x1="66" y1="44" x2="66" y2="47" stroke="#888" stroke-width="1.5"/>
  <!-- Proteção da agulha -->
  <rect x="72" y="43" width="10" height="14" rx="3" fill="#9aaab0" opacity="0.5"/>
  <!-- Rótulo -->
  <rect x="32" y="50" width="28" height="6" rx="1" fill="#225599" opacity="0.7"/>
  <text x="46" y="55" text-anchor="middle" font-family="sans-serif" font-size="5" font-weight="bold" fill="white">MORFINA</text>
  <!-- Bolha de ar -->
  <circle cx="58" cy="50" r="3" fill="white" opacity="0.3"/>
</svg>

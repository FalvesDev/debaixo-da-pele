<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="8" fill="#1a1a2e"/>
  <!-- Rolo de bandagem -->
  <circle cx="50" cy="50" r="28" fill="#e8d8c0"/>
  <circle cx="50" cy="50" r="22" fill="#f0e4cc"/>
  <circle cx="50" cy="50" r="16" fill="#e8d8c0"/>
  <circle cx="50" cy="50" r="10" fill="#f0e4cc"/>
  <!-- Espiral da bandagem -->
  <circle cx="50" cy="50" r="28" fill="none" stroke="#d0b898" stroke-width="2" stroke-dasharray="6,4"/>
  <circle cx="50" cy="50" r="22" fill="none" stroke="#d0b898" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- Ponta saindo do rolo -->
  <path d="M50 22 Q40 16 32 20 Q26 26 30 34" fill="none" stroke="#e8d8c0" stroke-width="6" stroke-linecap="round"/>
  <!-- Cruz de primeiros socorros no centro -->
  <rect x="45" y="42" width="10" height="3" rx="1.5" fill="#cc2222" opacity="0.7"/>
  <rect x="47" y="40" width="6" height="7" rx="1.5" fill="#cc2222" opacity="0.7"/>
  <!-- Borda do rolo -->
  <circle cx="50" cy="50" r="28" fill="none" stroke="#c0a880" stroke-width="1.5"/>
</svg>

  <text x="47" y="44" text-anchor="middle" font-family="sans-serif" font-size="5.5" font-weight="bold" fill="white">EPINEFRINA</text>
  <!-- Raio (símbolo de adrenalina) -->
  <text x="50" y="68" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#ffcc00" opacity="0.8">⚡</text>

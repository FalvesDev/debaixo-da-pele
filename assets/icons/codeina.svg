<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="8" fill="#1a1a2e"/>
  <!-- Cartela de comprimidos -->
  <rect x="15" y="30" width="70" height="40" rx="5" fill="#d0c090"/>
  <rect x="15" y="30" width="70" height="40" rx="5" fill="none" stroke="#b0a060" stroke-width="1.5"/>
  <!-- Linha divisória -->
  <line x1="15" y1="50" x2="85" y2="50" stroke="#b0a060" stroke-width="1"/>
  <line x1="38" y1="30" x2="38" y2="70" stroke="#b0a060" stroke-width="1"/>
  <line x1="62" y1="30" x2="62" y2="70" stroke="#b0a060" stroke-width="1"/>
  <!-- Blister dos comprimidos (superior) -->
  <ellipse cx="27" cy="40" rx="8" ry="7" fill="#f0e0b0"/>
  <ellipse cx="50" cy="40" rx="8" ry="7" fill="#f0e0b0"/>
  <ellipse cx="73" cy="40" rx="8" ry="7" fill="#eea050"/>
  <!-- Blister dos comprimidos (inferior) -->
  <ellipse cx="27" cy="60" rx="8" ry="7" fill="#f0e0b0"/>
  <ellipse cx="50" cy="60" rx="8" ry="7" fill="#eea050"/>
  <ellipse cx="73" cy="60" rx="8" ry="7" fill="#aaa" opacity="0.5"/>
  <!-- Comprimido já usado (furado) -->
  <ellipse cx="73" cy="60" rx="5" ry="4" fill="#888" opacity="0.3"/>
  <circle cx="73" cy="60" r="2" fill="#1a1a2e" opacity="0.4"/>
  <!-- Rótulo -->
  <rect x="20" y="74" width="60" height="10" rx="3" fill="#225599" opacity="0.8"/>
  <text x="50" y="81.5" text-anchor="middle" font-family="sans-serif" font-size="6.5" font-weight="bold" fill="white">CODEÍNA 30mg</text>
</svg>

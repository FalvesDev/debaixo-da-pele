<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="8" fill="#1a1a2e"/>
  <!-- Carretel de corda enrolada -->
  <circle cx="50" cy="50" r="32" fill="none" stroke="#8a6a2a" stroke-width="6"/>
  <circle cx="50" cy="50" r="24" fill="none" stroke="#7a5a1a" stroke-width="5"/>
  <circle cx="50" cy="50" r="16" fill="none" stroke="#8a6a2a" stroke-width="4"/>
  <circle cx="50" cy="50" r="8" fill="none" stroke="#7a5a1a" stroke-width="3"/>
  <!-- Traçado trançado nas voltas (simulação) -->
  <circle cx="50" cy="50" r="32" fill="none" stroke="#6a4a0a" stroke-width="6" stroke-dasharray="8,4"/>
  <circle cx="50" cy="50" r="24" fill="none" stroke="#6a4a0a" stroke-width="5" stroke-dasharray="7,3"/>
  <!-- Ponta da corda saindo -->
  <path d="M50 18 Q55 10 62 12 Q68 14 66 20 Q64 26 58 24 Q52 22 50 18 Z" fill="#8a6a2a" stroke="#6a4a0a" stroke-width="1"/>
  <!-- Centro -->
  <circle cx="50" cy="50" r="5" fill="#2a1a08"/>
  <!-- Etiqueta de 15m -->
  <rect x="36" y="44" width="28" height="12" rx="4" fill="#2a1a08" opacity="0.8"/>
  <text x="50" y="53" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="bold" fill="#c8a040">15m</text>
</svg>

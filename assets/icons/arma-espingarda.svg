<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="8" fill="#1a1a2e"/>
  <!-- Cano duplo -->
  <rect x="10" y="36" width="60" height="6" rx="2" fill="#8a8a8a"/>
  <rect x="10" y="43" width="60" height="6" rx="2" fill="#7a7a7a"/>
  <!-- Corpo da ação -->
  <rect x="60" y="32" width="20" height="22" rx="3" fill="#6a6a6a"/>

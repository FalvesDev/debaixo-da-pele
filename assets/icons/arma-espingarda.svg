  <!-- Protetor do gatilho -->
  <path d="M65 54 Q62 60 66 65 Q70 65 72 54 Z" fill="none" stroke="#888" stroke-width="2"/>
  <!-- Gatilho -->
  <line x1="68" y1="54" x2="67" y2="64" stroke="#999" stroke-width="2"/>
  <!-- Mira -->
  <rect x="10" y="34" width="3" height="4" rx="1" fill="#aaa"/>
  <rect x="65" y="32" width="3" height="3" rx="1" fill="#aaa"/>
  <!-- Brilho canos -->

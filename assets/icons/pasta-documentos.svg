  <rect x="12" y="30" width="76" height="55" rx="4" fill="none" stroke="#6a4a0a" stroke-width="2"/>
  <!-- Aba superior -->
  <path d="M12 30 Q12 22 22 22 L52 22 Q60 22 60 30 Z" fill="#9a7a3a"/>

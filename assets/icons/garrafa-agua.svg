  <path d="M26 62 Q30 60 36 62" fill="none" stroke="white" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <!-- Bolhas -->
  <circle cx="40" cy="72" r="3" fill="white" opacity="0.2"/>
  <circle cx="55" cy="65" r="2" fill="white" opacity="0.2"/>
  <circle cx="64" cy="75" r="2.5" fill="white" opacity="0.15"/>
  <!-- Tampinha -->
  <rect x="37" y="18" width="26" height="9" rx="4" fill="#2266aa"/>
  <!-- Gargalo -->
  <rect x="37" y="25" width="26" height="12" rx="2" fill="#77aacc"/>
  <!-- Brilho na garrafa -->
  <path d="M28 38 Q28 52 28 65" stroke="white" stroke-width="3" opacity="0.15" stroke-linecap="round"/>
  <!-- Label rotulado -->
  <rect x="28" y="50" width="44" height="16" rx="3" fill="white" opacity="0.2"/>
  <text x="50" y="58" text-anchor="middle" font-family="sans-serif" font-size="6" fill="white" font-weight="bold">ÁGUA</text>
  <text x="50" y="64.5" text-anchor="middle" font-family="sans-serif" font-size="5" fill="white" opacity="0.8">500ml</text>
</svg>

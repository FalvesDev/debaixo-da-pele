<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="8" fill="#1a1a2e"/>
  <!-- Embalagem da barra -->
  <rect x="12" y="30" width="76" height="40" rx="5" fill="#8a4a10"/>
  <rect x="12" y="30" width="76" height="40" rx="5" fill="none" stroke="#6a3008" stroke-width="1.5"/>
  <!-- Frente da barra (cor de chocolate/cereal) -->
  <rect x="14" y="32" width="72" height="36" rx="4" fill="#c07830"/>
  <!-- Barra em si -->
  <rect x="18" y="36" width="64" height="28" rx="3" fill="#d09040"/>
  <!-- Segmentos da barra -->
  <line x1="36" y1="36" x2="36" y2="64" stroke="#b07020" stroke-width="2"/>
  <line x1="54" y1="36" x2="54" y2="64" stroke="#b07020" stroke-width="2"/>
  <line x1="72" y1="36" x2="72" y2="64" stroke="#b07020" stroke-width="2"/>
  <!-- Textura de cereal/granola -->
  <circle cx="26" cy="44" r="2" fill="#c08030" opacity="0.7"/>
  <circle cx="44" cy="52" r="2" fill="#c08030" opacity="0.7"/>
  <circle cx="62" cy="44" r="2" fill="#c08030" opacity="0.7"/>
  <circle cx="78" cy="56" r="1.5" fill="#c08030" opacity="0.7"/>
  <!-- Label -->
  <rect x="18" y="54" width="64" height="8" rx="2" fill="#6a3008" opacity="0.6"/>
  <text x="50" y="60.5" text-anchor="middle" font-family="sans-serif" font-size="6" font-weight="bold" fill="#ffcc66">BARRA ENERGÉTICA</text>
  <!-- Raio de energia -->
  <text x="50" y="82" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#ffcc00" opacity="0.7">+ENERGIA</text>
</svg>

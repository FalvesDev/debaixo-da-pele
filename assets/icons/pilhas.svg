<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="8" fill="#1a1a2e"/>
  <!-- Pilha 1 (frente) -->
  <rect x="38" y="25" width="20" height="50" rx="5" fill="#6a6a3a"/>
  <rect x="38" y="25" width="20" height="50" rx="5" fill="none" stroke="#888844" stroke-width="1.5"/>
  <!-- Terminal positivo -->
  <rect x="44" y="20" width="8" height="7" rx="2" fill="#aaa"/>
  <!-- Terminal negativo (base) -->
  <rect x="38" y="73" width="20" height="4" rx="2" fill="#555"/>
  <!-- Rótulo -->
  <rect x="40" y="35" width="16" height="26" rx="2" fill="#555533"/>
  <text x="48" y="46" text-anchor="middle" font-family="sans-serif" font-size="7" font-weight="bold" fill="#ffdd00">AA</text>
  <text x="48" y="55" text-anchor="middle" font-family="sans-serif" font-size="5" fill="#ccbb00">1.5V</text>
  <!-- Pilha 2 (atrás esquerda) -->
  <rect x="20" y="28" width="18" height="46" rx="5" fill="#5a5a30" opacity="0.7"/>
  <rect x="24" y="23" width="8" height="7" rx="2" fill="#999" opacity="0.7"/>
  <!-- Pilha 3 (atrás direita) -->
  <rect x="62" y="28" width="18" height="46" rx="5" fill="#5a5a30" opacity="0.7"/>
  <rect x="66" y="23" width="8" height="7" rx="2" fill="#999" opacity="0.7"/>
  <!-- Seta de carga -->
  <text x="50" y="90" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#666">x 4</text>

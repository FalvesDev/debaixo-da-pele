<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="8" fill="#1a1a2e"/>
  <!-- Feixe -->
  <path d="M58 44 L90 28 L92 60 L58 56 Z" fill="#fffaa0" opacity="0.25"/>
  <!-- Elástico da cabeça -->
  <path d="M15 40 Q50 30 85 40" fill="none" stroke="#555" stroke-width="4" stroke-linecap="round"/>
  <path d="M15 60 Q50 70 85 60" fill="none" stroke="#555" stroke-width="4" stroke-linecap="round"/>
  <line x1="15" y1="40" x2="15" y2="60" stroke="#555" stroke-width="4" stroke-linecap="round"/>
  <line x1="85" y1="40" x2="85" y2="60" stroke="#555" stroke-width="4" stroke-linecap="round"/>
  <!-- Base da lanterna -->
  <rect x="38" y="38" width="22" height="24" rx="4" fill="#4a4a5a"/>
  <!-- Cabeça (lente) -->
  <ellipse cx="60" cy="50" rx="6" ry="11" fill="#3a3a4a"/>
  <!-- Lente -->
  <ellipse cx="62" cy="50" rx="4" ry="8" fill="#fffaa0"/>
  <ellipse cx="62" cy="50" rx="2.5" ry="5" fill="#ffee44"/>
  <ellipse cx="60" cy="44" rx="1" ry="1.5" fill="white" opacity="0.7"/>
  <!-- Clip de fixação -->
  <rect x="45" y="34" width="12" height="6" rx="3" fill="#333"/>
  <!-- Botão -->
  <circle cx="46" cy="50" r="3" fill="#cc4444"/>
  <circle cx="46" cy="50" r="1.5" fill="#ff6666"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="8" fill="#1a1a2e"/>
  <!-- Caixa maior com detalhe -->
  <rect x="12" y="24" width="76" height="55" rx="6" fill="#cc2222"/>
  <rect x="12" y="24" width="76" height="55" rx="6" fill="none" stroke="#991111" stroke-width="2"/>
  <!-- Tampa -->
  <rect x="12" y="24" width="76" height="26" rx="6" fill="#dd3333"/>
  <rect x="12" y="47" width="76" height="4" fill="#bb1111"/>
  <!-- Alça reforçada -->
  <path d="M32 24 Q50 12 68 24" fill="none" stroke="#aa1111" stroke-width="6" stroke-linecap="round"/>
  <!-- Cruz grande -->
  <rect x="41" y="33" width="18" height="6" rx="3" fill="white"/>
  <rect x="46" y="28" width="8" height="16" rx="3" fill="white"/>
  <!-- Tarja verde = avançado -->
  <rect x="12" y="67" width="76" height="12" rx="4" fill="#226622"/>
  <text x="50" y="77" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="bold" fill="white">AVANÇADO</text>
  <!-- Fecho com trava -->
  <rect x="42" y="47" width="16" height="6" rx="3" fill="#881111"/>
  <rect x="46" y="48" width="8" height="4" rx="2" fill="#cc4444"/>
</svg>
